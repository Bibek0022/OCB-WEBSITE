<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCB - नेपालको उत्कृष्ट सिकाइ केन्द्र</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.85)), 
                        url('https://source.unsplash.com/random/1920x1080/?nepal,students') center/cover;
        }
        .card-hover:hover { transform: translateY(-12px); box-shadow: 0 25px 30px -10px rgb(0 0 0 / 0.2); }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-700 rounded-3xl flex items-center justify-center text-white text-4xl font-bold">OCB</div>
                <h1 class="text-3xl font-bold text-blue-700">OCB</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="showLoginModal('user')" class="px-6 py-3 border-2 border-blue-700 text-blue-700 font-semibold rounded-2xl hover:bg-blue-50">विद्यार्थी लग इन</button>
                <button onclick="showLoginModal('admin')" class="px-6 py-3 bg-blue-700 text-white font-semibold rounded-2xl hover:bg-blue-800">एडमिन लग इन</button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero-bg h-screen flex items-center text-white">
        <div class="max-w-7xl mx-auto px-6">
            <div class="max-w-2xl">
                <h1 class="text-5xl md:text-6xl font-bold leading-tight">तपाईंको सपनालाई साकार बनाउने प्लेटफर्म</h1>
                <p class="mt-6 text-xl">NEB • BBS • Banking • Loksewa</p>
            </div>
        </div>
    </section>

    <!-- Resources -->
    <section id="resources" class="py-20 bg-gray-100">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-12">उपलब्ध सामग्रीहरु</h2>
            <div id="resourcesContainer" class="grid md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md mx-4">
            <h2 id="modalTitle" class="text-2xl font-bold text-center mb-6">लग इन गर्नुहोस्</h2>
            <input id="email" type="email" placeholder="इमेल" class="w-full px-5 py-4 border rounded-2xl mb-4">
            <input id="password" type="password" placeholder="पासवर्ड" class="w-full px-5 py-4 border rounded-2xl mb-6">
            <button onclick="handleLogin()" class="w-full py-4 bg-blue-700 text-white font-semibold rounded-2xl">लग इन</button>
            <button onclick="hideLoginModal()" class="mt-4 w-full text-gray-500">रद्द गर्नुहोस्</button>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="hidden min-h-screen bg-gray-100">
        <div class="bg-white p-6 flex justify-between items-center shadow sticky top-0">
            <h1 class="text-3xl font-bold text-blue-700">OCB एडमिन प्यानल</h1>
            <button onclick="logout()" class="px-6 py-3 bg-red-600 text-white rounded-2xl">लग आउट</button>
        </div>
        <div class="max-w-7xl mx-auto px-6 py-10">
            <div class="grid md:grid-cols-2 gap-10">
                <div class="bg-white p-8 rounded-3xl shadow">
                    <h2 class="text-2xl font-bold mb-6">📄 नयाँ PDF / नोट थप्नुहोस्</h2>
                    <input id="noteTitle" placeholder="शीर्षक" class="w-full px-5 py-4 border rounded-2xl mb-4">
                    <input id="noteCategory" placeholder="कोटि (NEB, BBS, Banking, Loksewa)" class="w-full px-5 py-4 border rounded-2xl mb-4">
                    <input id="pdfLink" placeholder="PDF Direct Link (वा फाइल नाम)" class="w-full px-5 py-4 border rounded-2xl mb-6">
                    <button onclick="addPDF()" class="w-full py-4 bg-green-600 text-white rounded-2xl font-semibold">PDF थप्नुहोस्</button>
                </div>

                <div class="bg-white p-8 rounded-3xl shadow">
                    <h2 class="text-2xl font-bold mb-6">🎥 नयाँ भिडियो थप्नुहोस्</h2>
                    <input id="videoTitle" placeholder="भिडियो शीर्षक" class="w-full px-5 py-4 border rounded-2xl mb-4">
                    <input id="videoUrl" placeholder="YouTube Link" class="w-full px-5 py-4 border rounded-2xl mb-6">
                    <button onclick="addVideo()" class="w-full py-4 bg-blue-700 text-white rounded-2xl font-semibold">भिडियो थप्नुहोस्</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let resources = [];

        const ADMIN_EMAIL = "admin@ocb.com";
        const ADMIN_PASS = "ADMIN2002#";
        const USER_EMAIL = "user@ocb.com";
        const USER_PASS = "OCB2078";

        let currentUser = null;

        function showLoginModal(type) {
            document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('modalTitle').textContent = type === 'admin' ? 'एडमिन लग इन' : 'विद्यार्थी लग इन';
        }

        function hideLoginModal() {
            document.getElementById('loginModal').classList.add('hidden');
        }

        function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
                currentUser = 'admin';
                hideLoginModal();
                document.getElementById('adminDashboard').classList.remove('hidden');
            } else if (email === USER_EMAIL && pass === USER_PASS) {
                currentUser = 'user';
                hideLoginModal();
                alert("स्वागत छ! OCB मा सफल लग इन भयो।");
            } else {
                alert("गलत इमेल वा पासवर्ड!");
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('adminDashboard').classList.add('hidden');
        }

        // Add PDF with real download capability
        function addPDF() {
            if (currentUser !== 'admin') return alert("एडमिनले मात्र थप्न सक्छन्");
            
            const title = document.getElementById('noteTitle').value;
            const category = document.getElementById('noteCategory').value || "General";
            let link = document.getElementById('pdfLink').value;

            if (!title) return alert("शीर्षक लेख्नुहोस्");

            // यदि लिङ्क खाली छ भने sample PDF प्रयोग गर
            if (!link) {
                link = "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf";
            }

            resources.push({
                type: "pdf",
                title: title,
                category: category,
                downloadLink: link
            });

            renderResources();
            clearForms();
        }

        function addVideo() {
            if (currentUser !== 'admin') return alert("एडमिनले मात्र थप्न सक्छन्");
            
            const title = document.getElementById('videoTitle').value;
            const url = document.getElementById('videoUrl').value;
            const category = "Video";

            if (!title || !url) return alert("शीर्षक र लिङ्क भर्नुहोस्");

            resources.push({ type: "video", title, url, category });
            renderResources();
            clearForms();
        }

        function clearForms() {
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteCategory').value = '';
            document.getElementById('pdfLink').value = '';
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoUrl').value = '';
        }

        function renderResources() {
            const container = document.getElementById('resourcesContainer');
            container.innerHTML = '';

            resources.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-3xl p-6 card-hover";

                if (item.type === "pdf") {
                    div.innerHTML = `
                        <div class="flex gap-5">
                            <span class="text-5xl">📕</span>
                            <div class="flex-1">
                                <span class="text-green-600">${item.category}</span>
                                <h3 class="font-semibold text-lg mt-2">${item.title}</h3>
                                <a href="${item.downloadLink}" target="_blank" download 
                                   class="mt-6 inline-block px-6 py-3 bg-green-600 text-white rounded-2xl hover:bg-green-700">
                                    📥 PDF डाउनलोड गर्नुहोस्
                                </a>
                            </div>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="flex gap-5">
                            <span class="text-5xl">🎥</span>
                            <div class="flex-1">
                                <span class="text-blue-600">${item.category}</span>
                                <h3 class="font-semibold text-lg mt-2">${item.title}</h3>
                                <a href="${item.url}" target="_blank" 
                                   class="mt-6 inline-block px-6 py-3 bg-blue-700 text-white rounded-2xl hover:bg-blue-800">
                                    ▶️ भिडियो हेर्नुहोस्
                                </a>
                            </div>
                        </div>
                    `;
                }
                container.appendChild(div);
            });
        }

        // Initial Sample Resources
        window.onload = () => {
            resources = [
                { type: "pdf", title: "Class 12 English Notes 2083", category: "NEB", downloadLink: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" },
                { type: "pdf", title: "Banking GK & Current Affairs", category: "Banking", downloadLink: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" },
                { type: "video", title: "Loksewa Preparation - GK Class", category: "Loksewa", url: "https://www.youtube.com/embed/dQw4w9wgxcq" }
            ];
            renderResources();
        };
    </script>
</body>
</html>
