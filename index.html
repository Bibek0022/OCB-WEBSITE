<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCB Education - Note Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .category-title { border-left: 5px solid #1d4ed8; padding-left: 15px; margin-bottom: 25px; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-900 to-blue-700">
        <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md mx-4 text-center">
            <div class="w-20 h-20 bg-blue-700 rounded-3xl mx-auto flex items-center justify-center text-white text-5xl font-bold mb-6">OCB</div>
            <h1 class="text-3xl font-bold text-blue-700 mb-2">OCB Education</h1>
            <p class="text-gray-500 mb-8">Powered by OnlineClassWithBibek</p>
            
            <input id="email" type="email" placeholder="" class="w-full px-5 py-4 border rounded-2xl mb-4 outline-none focus:border-blue-600">
            <input id="password" type="password" placeholder="" class="w-full px-5 py-4 border rounded-2xl mb-6 outline-none focus:border-blue-600">
            <button onclick="handleLogin()" class="w-full py-4 bg-blue-700 text-white font-semibold rounded-2xl text-lg hover:bg-blue-800 transition">  </button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="bg-white shadow-md sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center text-white text-2xl font-bold">OCB</div>
                    <h1 class="text-2xl font-bold text-blue-700">OCB Education</h1>
                </div>
                <button onclick="logout()" class="px-5 py-2 bg-red-600 text-white rounded-xl hover:bg-red-700 transition"> </button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-6 py-12">
            <div id="contentArea"></div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            if ((email === "admin@ocb.com" && pass === "ADMIN2002#") || (email === "user@ocb.com" && pass === "OCB2078")) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                renderContent();
            } else { alert("   !"); }
        }

        function logout() { location.reload(); }

        function renderContent() {
            const sections = [
                {
                    header: "NEB Class 11 (Commerce)",
                    items: [
                        { subject: "English", title: "Class 11 English New Course Notes" },
                        { subject: "Nepali", title: "Class 11 Nepali Sahitya Notes" },
                        { subject: "Accountancy", title: "Class 11 Accountancy Complete Notes" },
                        { subject: "Business Studies", title: "Class 11 Business Studies" },
                        { subject: "Economics", title: "Class 11 Economics Notes" },
                        { subject: "Business Mathematics", title: "Class 11 Business Mathematics" }
                    ]
                },
                {
                    header: "NEB Class 12 (Commerce)",
                    items: [
                        { subject: "English", title: "Class 12 English New Course Notes" },
                        { subject: "Nepali", title: "Class 12 Nepali Sahitya" },
                        { subject: "Accountancy", title: "Class 12 Accountancy Advanced Notes" },
                        { subject: "Business Studies", title: "Class 12 Business Studies" },
                        { subject: "Economics", title: "Class 12 Economics Complete Notes" },
                        { subject: "Marketing", title: "Class 12 Marketing Notes" },
                        { subject: "Business Mathematics", title: "Class 12 Business Mathematics" }
                    ]
                },
                {
                    header: "BBS (1st, 2nd & 3rd Year)",
                    items: [
                        { subject: "BBS 1st Year", title: "Business Statistics, English, Microeconomics, Accounting, POM" },
                        { subject: "BBS 2nd Year", title: "Business Comm, Macroeconomics, Cost Acc, Finance, OB & HRM" },
                        { subject: "BBS 3rd Year", title: "Business Law, Marketing, Environment, Taxation, Entrepreneurship" }
                    ]
                },
                {
                    header: "BBS 4th Year (Specialization)",
                    items: [
                        { subject: "Core Subjects", title: "Entrepreneurship, Research Methods, Final Project" },
                        { subject: "Accounting Group", title: "Theory, Auditing, Corporate Taxation" },
                        { subject: "Finance Group", title: "Corporate Finance, Bank Management, Investment" },
                        { subject: "Marketing Group", title: "Consumer Behavior, Sales, International Marketing" },
                        { subject: "Management Group", title: "Int'l Business, SME, Strategic Management" }
                    ]
                },
                {
                    header: "Loksewa & Banking Preparation",
                    items: [
                        { subject: "Loksewa", title: "Kharidar, Naayab Subba, Shaakha Adhikrit, TSC" },
                        { subject: "Banking", title: "NRB, RBB, ADBL, NBL Preparation Notes" },
                        { subject: "Private Banks", title: "Nabil, NIC Asia, Global IME GK & IQ" }
                    ]
                }
            ];

            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = sections.map(sec => `
                <div class="mb-16">
                    <h2 class="text-3xl font-bold text-gray-800 category-title">${sec.header}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${sec.items.map(item => `
                            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 hover:shadow-xl transition duration-300">
                                <div class="flex items-center gap-4 mb-4">
                                    <div class="w-12 h-12 bg-blue-100 text-blue-700 rounded-2xl flex items-center justify-center text-xl">
                                        <i class="fa-solid fa-file-lines"></i>
                                    </div>
                                    <h3 class="font-bold text-lg text-gray-800">${item.subject}</h3>
                                </div>
                                <p class="text-gray-500 text-sm mb-6">${item.title}</p>
                                <button onclick="alert('${item.subject} PDF  ...')" 
                                        class="w-full py-3 bg-green-600 text-white font-bold rounded-2xl hover:bg-green-700 transition">
                                    <i class="fa-solid fa-download mr-2"></i> PDF 
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
