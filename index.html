<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCB - Nepal's Smart Learning Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.8)), 
                        url('https://source.unsplash.com/random/1920x1080/?students,nepal') center/cover;
        }
        .card-hover:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.15); }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-blue-700 rounded-2xl flex items-center justify-center text-white text-3xl font-bold">OCB</div>
                <h1 class="text-3xl font-bold text-blue-700">OCB</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="showLoginModal('user')" 
                        class="px-6 py-2.5 border border-blue-600 text-blue-600 font-semibold rounded-2xl hover:bg-blue-50">
                    User Login
                </button>
                <button onclick="showLoginModal('admin')" 
                        class="px-6 py-2.5 bg-blue-700 text-white font-semibold rounded-2xl hover:bg-blue-800">
                    Admin Login
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero-bg h-screen flex items-center text-white">
        <div class="max-w-7xl mx-auto px-6">
            <div class="max-w-2xl">
                <h1 class="text-5xl md:text-6xl font-bold leading-tight">
                      <span class="text-yellow-400"></span>
                </h1>
                <p class="mt-6 text-xl">NEB, BBS, Banking  Loksewa     </p>
            </div>
        </div>
    </section>

    <!-- Resources -->
    <section id="resources" class="py-20 bg-gray-100">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-12"> </h2>
            <div id="resourcesContainer" class="grid md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md mx-4">
            <h2 id="modalTitle" class="text-2xl font-bold text-center mb-6">Login</h2>
            <input id="email" type="email" placeholder="Email" class="w-full px-5 py-4 border rounded-2xl mb-4">
            <input id="password" type="password" placeholder="Password" class="w-full px-5 py-4 border rounded-2xl mb-6">
            <button onclick="handleLogin()" class="w-full py-4 bg-blue-700 text-white font-semibold rounded-2xl">Login</button>
            <button onclick="hideLoginModal()" class="mt-4 w-full text-gray-500">Cancel</button>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="hidden min-h-screen bg-gray-100">
        <div class="bg-white p-6 flex justify-between items-center shadow sticky top-0">
            <h1 class="text-3xl font-bold text-blue-700">OCB Admin Panel</h1>
            <button onclick="logout()" class="px-6 py-3 bg-red-600 text-white rounded-2xl">Logout</button>
        </div>
        
        <div class="max-w-7xl mx-auto px-6 py-10">
            <div class="grid md:grid-cols-2 gap-10">
                <!-- Add Note / PDF -->
                <div class="bg-white p-8 rounded-3xl shadow">
                    <h2 class="text-2xl font-bold mb-6">   / PDF </h2>
                    <input id="noteTitle" placeholder="" class="w-full px-5 py-4 border rounded-2xl mb-4">
                    <input id="noteCategory" placeholder="Category (NEB, BBS, Banking, Loksewa)" class="w-full px-5 py-4 border rounded-2xl mb-4">
                    <input id="pdfFileName" placeholder="PDF File Name (e.g. class12_english.pdf)" class="w-full px-5 py-4 border rounded-2xl mb-6">
                    <button onclick="addNote()" class="w-full py-4 bg-green-600 text-white rounded-2xl font-semibold"> </button>
                </div>

                <!-- Add Video -->
                <div class="bg-white p-8 rounded-3xl shadow">
                    <h2 class="text-2xl font-bold mb-6">   </h2>
                    <input id="videoTitle" placeholder=" " class="w-full px-5 py-4 border rounded-2xl mb-4">
                    <input id="videoUrl" placeholder="YouTube Link" class="w-full px-5 py-4 border rounded-2xl mb-4">
                    <input id="videoCategory" placeholder="Category" class="w-full px-5 py-4 border rounded-2xl mb-6">
                    <button onclick="addVideo()" class="w-full py-4 bg-blue-700 text-white rounded-2xl font-semibold"> </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let resources = [];

        // Hardcoded Credentials
        const ADMIN_EMAIL = "admin@ocb.com";
        const ADMIN_PASS = "ADMIN2002#";
        const USER_EMAIL = "user@ocb.com";
        const USER_PASS = "OCB2078";

        let currentUser = null; // 'user' or 'admin'

        function showLoginModal(type) {
            document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('modalTitle').textContent = type === 'admin' ? 'Admin Login' : 'User Login';
        }

        function hideLoginModal() {
            document.getElementById('loginModal').classList.add('hidden');
        }

        function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (email === ADMIN_EMAIL && password === ADMIN_PASS) {
                currentUser = 'admin';
                hideLoginModal();
                document.getElementById('adminDashboard').classList.remove('hidden');
                alert("Admin Login  !");
            } 
            else if (email === USER_EMAIL && password === USER_PASS) {
                currentUser = 'user';
                hideLoginModal();
                alert("User Login  ! Welcome to OCB");
            } 
            else {
                alert(" Email  Password!");
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('adminDashboard').classList.add('hidden');
        }

        function addNote() {
            if (currentUser !== 'admin') return alert("Admin    !");

            const title = document.getElementById('noteTitle').value;
            const category = document.getElementById('noteCategory').value || "General";
            const fileName = document.getElementById('pdfFileName').value || "document.pdf";

            if (!title) return alert(" ");

            resources.push({
                type: "pdf",
                title: title,
                category: category,
                file: fileName,
                time: new Date().toLocaleDateString()
            });

            renderResources();
            clearForm();
        }

        function addVideo() {
            if (currentUser !== 'admin') return alert("Admin    !");

            const title = document.getElementById('videoTitle').value;
            const url = document.getElementById('videoUrl').value;
            const category = document.getElementById('videoCategory').value || "General";

            if (!title || !url) return alert("    ");

            resources.push({
                type: "video",
                title: title,
                url: url,
                category: category,
                time: new Date().toLocaleDateString()
            });

            renderResources();
            clearForm();
        }

        function clearForm() {
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteCategory').value = '';
            document.getElementById('pdfFileName').value = '';
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoUrl').value = '';
            document.getElementById('videoCategory').value = '';
        }

        function renderResources() {
            const container = document.getElementById('resourcesContainer');
            container.innerHTML = '';

            resources.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-3xl p-6 card-hover";

                if (item.type === "pdf") {
                    div.innerHTML = `
                        <div class="flex items-start gap-4">
                            <div class="text-4xl"></div>
                            <div class="flex-1">
                                <span class="text-green-600 text-sm">${item.category}</span>
                                <h3 class="font-semibold text-lg mt-1">${item.title}</h3>
                                <p class="text-sm text-gray-500">${item.file}</p>
                                <button onclick="downloadPDF('${item.file}')" 
                                        class="mt-4 px-5 py-2 bg-green-600 text-white text-sm rounded-xl hover:bg-green-700">
                                    Download PDF
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="flex items-start gap-4">
                            <div class="text-4xl"></div>
                            <div class="flex-1">
                                <span class="text-blue-600 text-sm">${item.category}</span>
                                <h3 class="font-semibold text-lg mt-1">${item.title}</h3>
                                <a href="${item.url}" target="_blank" 
                                   class="mt-4 inline-block px-5 py-2 bg-blue-600 text-white text-sm rounded-xl hover:bg-blue-700">
                                    Watch Video 
                                </a>
                            </div>
                        </div>
                    `;
                }
                container.appendChild(div);
            });
        }

        function downloadPDF(filename) {
            alert(`Downloading: ${filename}\n(   ,   )`);
        }

        // Close modal when clicking outside
        document.getElementById('loginModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('loginModal')) hideLoginModal();
        });
    </script>
</body>
</html>
